# Version: 0.6.9
# Synopsis: Generalized PV-, weather- and UI-time-aware floor cooling control for Tecalor THZ504.
# Description:
#   Home Assistant package for conservative floor cooling control.
#   Edit the input_text entity mapping block to adapt the package to another installation.
#   Comfort target defaults to 22 °C average room temperature.
#   The THZ internal cooling, compressor, flow-temperature and dewpoint protection remain authoritative.
#
# Main functions:
#   - Dynamic cooling enable/disable
#   - PV surplus and curtailment optimization
#   - Battery-aware day/night logic
#   - Weather forecast aware pre-cooling
#   - UI-controllable day/night time window
#   - Live synchronization of UI setpoint helpers to THZ climate entities
#   - Dewpoint and humidity safety checks
#   - v0.6.1 fixes Home Assistant entity_id generation for Dew Point Safe
#   - v0.6.2 adds explicit Weather Preconditioning Ready sensor and allows weather-based pre-cooling to satisfy start demand
#   - v0.6.3 adds Start Conditions Met, Start Blocker diagnostics and defaults Day Start Time to 06:00
#   - v0.6.4 removes all initial: values from user-editable helpers so UI settings survive restarts
#   - v0.6.5 limits push notifications to Start Allowed, Control Reason, Start Blocker, Stop Required, Cooling Score and Start Conditions Met
#   - v0.6.6 adds dependency handling: Weather Preconditioning depends on PV Preconditioning; score pushes are reduced to 10-point band changes
#   - v0.6.7 debounces high-level push notifications and removes Cooling Score from push triggers
#   - v0.6.9 moves the weighted cooling temperature sensor into the package, adds weekend weighting, UI notification mode and stricter heat extraction state
#   - Flow/return delta diagnostics
#   - Push notifications only for debounced high-level control-state changes
#
# Notes:
#   - Solcast forecast sensors are expected in Wh.
#   - weather.get_forecasts is used with type: daily.
#   - For floor cooling, all relevant heating/cooling circuits must provide sufficient flow.

# Recommended one-time setup values (set manually in the UI after first installation; no helper uses initial:)
#
# Entity mapping defaults for this installation:
#   thz504_entity_indoor_temp_average: sensor.temperatur_haus_mittel_alle
#   thz504_entity_indoor_temp_weighted: sensor.temperatur_haus_kuhlung_gewichtung
#   thz504_entity_room_living_temperature: sensor.eltako_gw1_05_91_dd_e4_temperature
#   thz504_entity_room_bedroom_temperature: sensor.eltako_gw1_05_91_df_e0_temperature
#   thz504_entity_room_office_temperature: sensor.eltako_gw1_05_96_20_c7_temperature
#   thz504_entity_room_kitchen_temperature: sensor.eltako_gw1_05_93_c2_32_temperature
#   thz504_entity_room_guest_temperature: sensor.eltako_gw1_05_96_2a_9f_temperature
#   thz504_entity_room_dressing_temperature: sensor.eltako_gw1_05_91_dd_cb_temperature
#   thz504_entity_indoor_humidity_average: sensor.luftfeuchtigkeit_haus_mittel
#   thz504_entity_outdoor_temp: sensor.temperatur_aussen_mittel
#   thz504_entity_weather: weather.ieppel31
#   thz504_entity_pv_generation: sensor.senec_pv_erzeugung
#   thz504_entity_pv_direct_consumption: sensor.senec_pv_direktverbrauch
#   thz504_entity_pv_surplus: sensor.pv_ueberschuss
#   thz504_entity_pv_curtailment: sensor.senec_pv_begrenzung
#   thz504_entity_grid_import: sensor.senec_netz_bezug
#   thz504_entity_grid_export: sensor.senec_netz_einspeisung
#   thz504_entity_battery_soc: sensor.senec_akku_ladestand
#   thz504_entity_battery_charge: sensor.senec_akku_laden
#   thz504_entity_battery_discharge: sensor.senec_akku_entladen
#   thz504_entity_pv_forecast_next_hour: sensor.solcast_pv_forecast_forecast_next_hour
#   thz504_entity_pv_forecast_today: sensor.solcast_pv_forecast_forecast_today
#   thz504_entity_pv_forecast_tomorrow: sensor.solcast_pv_forecast_forecast_tomorrow
#   thz504_entity_cooling_mode_switch: switch.esp32_thz_controller_kuehlmode
#   thz504_entity_compressor: binary_sensor.esp32_thz_controller_verdichter
#   thz504_entity_compressor_starts_today: sensor.esp32_thz_controller_starts_tag
#   thz504_entity_compressor_runtime_current: sensor.thz_verdichter_laufzeit_aktuell
#   thz504_entity_flow_temperature: sensor.esp32_thz_controller_vorlaufisttemp
#   thz504_entity_return_temperature: sensor.esp32_thz_controller_ruecklaufisttemp
#   thz504_entity_dewpoint: sensor.esp32_thz_controller_taupunkt_hk1
#   thz504_entity_climate_day: climate.esp32_thz_controller_heating_day
#   thz504_entity_climate_night: climate.esp32_thz_controller_heating_night
#   thz504_entity_notify_service: notify.mobile_app_op13
#   thz504_cooling_notification_mode: info
#
# Feature defaults:
#   thz504_cooling_automation_enabled: on
#   thz504_cooling_allow_night: on
#   thz504_cooling_pv_preconditioning_enabled: on
#   thz504_cooling_weather_preconditioning_enabled: on
#
# Time defaults:
#   thz504_cooling_day_start_time: 06:00:00
#   thz504_cooling_day_end_time: 21:00:00
#
# Threshold defaults:
#   thz504_cooling_day_start_temp: 23.2 °C
#   thz504_cooling_day_stop_temp: 22.0 °C
#   thz504_cooling_night_start_temp: 23.8 °C
#   thz504_cooling_night_stop_temp: 22.8 °C
#   thz504_cooling_comfort_override_temp: 24.8 °C
#   thz504_cooling_day_setpoint: 22.0 °C
#   thz504_cooling_night_setpoint: 22.8 °C
#   thz504_cooling_min_pv_surplus_day: 700 W
#   thz504_cooling_min_grid_export_day: 500 W
#   thz504_cooling_max_grid_import_day: 500 W
#   thz504_cooling_max_grid_import_night: 250 W
#   thz504_cooling_min_battery_soc_day: 45 %
#   thz504_cooling_min_battery_soc_night: 70 %
#   thz504_cooling_max_battery_discharge_night: 1500 W
#   thz504_cooling_min_pv_forecast_next_hour_wh: 800 Wh
#   thz504_cooling_min_pv_forecast_today_wh: 12000 Wh
#   thz504_cooling_weather_hot_temp: 27.0 °C
#   thz504_cooling_weather_very_hot_temp: 30.0 °C
#   thz504_cooling_weather_max_precip_probability: 60 %
#   thz504_cooling_weather_precooling_offset: 0.4 K
#   thz504_cooling_max_dewpoint_day: 17.0 °C
#   thz504_cooling_max_dewpoint_night: 16.5 °C
#   thz504_cooling_max_humidity_day: 65 %
#   thz504_cooling_max_humidity_night: 62 %
#   thz504_cooling_dewpoint_safety_margin: 3.0 K
#   thz504_cooling_max_compressor_starts: 12
#   thz504_cooling_min_effective_delta: 0.5 K
#
# Timer defaults are fixed in YAML:
#   thz504_cooling_min_runtime: 01:30:00
#   thz504_cooling_lockout: 01:30:00
#
# Central entity mapping. Set these entity IDs once in the UI for the target installation.
input_text:
  # Average indoor temperature used as plausibility/secondary demand signal.
  # Recommended default: sensor.temperatur_haus_mittel_alle
  thz504_entity_indoor_temp_average:
    name: THZ504 Entity Indoor Temperature Average
    max: 120

  # Weighted indoor cooling temperature used as the primary comfort signal.
  # Recommended default: sensor.temperatur_haus_kuhlung_gewichtung
  thz504_entity_indoor_temp_weighted:
    name: THZ504 Entity Indoor Temperature Weighted
    max: 120

  # Average indoor humidity used for condensation risk checks.
  # Recommended default: sensor.luftfeuchtigkeit_haus_mittel
  thz504_entity_indoor_humidity_average:
    name: THZ504 Entity Indoor Humidity Average
    max: 120

  # Outdoor temperature used in scoring and plausibility logic.
  # Recommended default: sensor.temperatur_aussen_mittel
  thz504_entity_outdoor_temp:
    name: THZ504 Entity Outdoor Temperature
    max: 120

  # Weather entity queried by weather.get_forecasts for daily forecast data.
  # Recommended default: weather.ieppel31
  thz504_entity_weather:
    name: THZ504 Entity Weather
    max: 120

  # Current PV production in W.
  # Recommended default: sensor.senec_pv_erzeugung
  thz504_entity_pv_generation:
    name: THZ504 Entity PV Generation
    max: 120

  # PV direct consumption in W; used for diagnostics and sensor validity.
  # Recommended default: sensor.senec_pv_direktverbrauch
  thz504_entity_pv_direct_consumption:
    name: THZ504 Entity PV Direct Consumption
    max: 120

  # PV surplus in W; preferred signal for energy availability.
  # Recommended default: sensor.pv_ueberschuss
  thz504_entity_pv_surplus:
    name: THZ504 Entity PV Surplus
    max: 120

  # PV limitation/curtailment percentage; values below 100 indicate curtailed production.
  # Recommended default: sensor.senec_pv_begrenzung
  thz504_entity_pv_curtailment:
    name: THZ504 Entity PV Curtailment
    max: 120

  # Grid import in W; limits unwanted grid-powered cooling.
  # Recommended default: sensor.senec_netz_bezug
  thz504_entity_grid_import:
    name: THZ504 Entity Grid Import
    max: 120

  # Grid export in W; indicates available PV surplus.
  # Recommended default: sensor.senec_netz_einspeisung
  thz504_entity_grid_export:
    name: THZ504 Entity Grid Export
    max: 120

  # Battery state of charge in percent.
  # Recommended default: sensor.senec_akku_ladestand
  thz504_entity_battery_soc:
    name: THZ504 Entity Battery SOC
    max: 120

  # Battery charging power in W; indicates surplus energy.
  # Recommended default: sensor.senec_akku_laden
  thz504_entity_battery_charge:
    name: THZ504 Entity Battery Charge
    max: 120

  # Battery discharge power in W; limits night cooling aggressiveness.
  # Recommended default: sensor.senec_akku_entladen
  thz504_entity_battery_discharge:
    name: THZ504 Entity Battery Discharge
    max: 120

  # PV forecast for the next hour in Wh.
  # Recommended default: sensor.solcast_pv_forecast_forecast_next_hour
  thz504_entity_pv_forecast_next_hour:
    name: THZ504 Entity PV Forecast Next Hour
    max: 120

  # PV forecast for today in Wh.
  # Recommended default: sensor.solcast_pv_forecast_forecast_today
  thz504_entity_pv_forecast_today:
    name: THZ504 Entity PV Forecast Today
    max: 120

  # PV forecast for tomorrow in Wh.
  # Recommended default: sensor.solcast_pv_forecast_forecast_tomorrow
  thz504_entity_pv_forecast_tomorrow:
    name: THZ504 Entity PV Forecast Tomorrow
    max: 120

  # THZ cooling mode switch controlled by the start/stop automations.
  # Recommended default: switch.esp32_thz_controller_kuehlmode
  thz504_entity_cooling_mode_switch:
    name: THZ504 Entity Cooling Mode Switch
    max: 120

  # THZ compressor running state.
  # Recommended default: binary_sensor.esp32_thz_controller_verdichter
  thz504_entity_compressor:
    name: THZ504 Entity Compressor
    max: 120

  # Compressor starts today; used to prevent excessive cycling.
  # Recommended default: sensor.esp32_thz_controller_starts_tag
  thz504_entity_compressor_starts_today:
    name: THZ504 Entity Compressor Starts Today
    max: 120

  # Current compressor runtime; currently used for diagnostics/notifications.
  # Recommended default: sensor.thz_verdichter_laufzeit_aktuell
  thz504_entity_compressor_runtime_current:
    name: THZ504 Entity Compressor Runtime Current
    max: 120

  # THZ flow temperature for dewpoint safety and delta diagnostics.
  # Recommended default: sensor.esp32_thz_controller_vorlaufisttemp
  thz504_entity_flow_temperature:
    name: THZ504 Entity Flow Temperature
    max: 120

  # THZ return temperature for cooling delta diagnostics.
  # Recommended default: sensor.esp32_thz_controller_ruecklaufisttemp
  thz504_entity_return_temperature:
    name: THZ504 Entity Return Temperature
    max: 120

  # THZ heating circuit dewpoint sensor used for floor-cooling condensation safety.
  # Recommended default: sensor.esp32_thz_controller_taupunkt_hk1
  thz504_entity_dewpoint:
    name: THZ504 Entity Dewpoint
    max: 120

  # THZ day target temperature climate entity.
  # Recommended default: climate.esp32_thz_controller_heating_day
  thz504_entity_climate_day:
    name: THZ504 Entity Climate Day
    max: 120

  # THZ night target temperature climate entity.
  # Recommended default: climate.esp32_thz_controller_heating_night
  thz504_entity_climate_night:
    name: THZ504 Entity Climate Night
    max: 120

  # Notification service used for push messages.
  # Recommended default: notify.mobile_app_op13
  thz504_entity_notify_service:
    name: THZ504 Notify Service
    max: 120

# Feature switches. They enable/disable automation, night cooling and pre-cooling logic.
input_boolean:
  # Master switch for the whole cooling automation.
  # Recommended default: true
  thz504_cooling_automation_enabled:
    name: THZ504 Cooling Automation Enabled
    icon: mdi:snowflake-auto

  # Allows cooling outside the configured day window.
  # Recommended default: true
  thz504_cooling_allow_night:
    name: THZ504 Cooling Allow Night Operation
    icon: mdi:weather-night

  # Allows PV-driven pre-cooling before hard comfort demand is reached.
  # Recommended default: true
  thz504_cooling_pv_preconditioning_enabled:
    name: THZ504 Cooling PV Preconditioning Enabled
    icon: mdi:solar-power-variant

  # Allows weather-driven pre-cooling on hot forecast days.
  # Recommended default: true
  thz504_cooling_weather_preconditioning_enabled:
    name: THZ504 Cooling Weather Preconditioning Enabled
    icon: mdi:weather-sunny-alert


# Notification mode.
# debug: debounced high-level state changes.
# info: only actual cooling switch actions from this automation.
# disabled: no mobile push notifications.
# Recommended default: info
input_select:
  thz504_cooling_notification_mode:
    name: THZ504 Cooling Notification Mode
    options:
      - debug
      - info
      - disabled
    icon: mdi:bell-cog-outline


# UI configurable day/night window. Day mode uses PV-oriented thresholds; night mode is more conservative.
input_datetime:
  # Start of day mode; default recommendation is 06:00:00.
  # Recommended default: 06:00:00
  thz504_cooling_day_start_time:
    name: THZ504 Cooling Day Start Time
    has_date: false
    has_time: true

  # End of day mode; default recommendation is 21:00:00.
  # Recommended default: 21:00:00
  thz504_cooling_day_end_time:
    name: THZ504 Cooling Day End Time
    has_date: false
    has_time: true

# User-tunable thresholds and setpoints. HA restores UI values after restart because no initial values are used.
input_number:
  # Normal day cooling start threshold before weather offset.
  # Recommended default: 23.2
  thz504_cooling_day_start_temp:
    name: THZ504 Cooling Day Start Temperature
    min: 21
    max: 28
    step: 0.1
    unit_of_measurement: "°C"

  # Day stop/comfort target temperature.
  # Recommended default: 22.0
  thz504_cooling_day_stop_temp:
    name: THZ504 Cooling Day Stop Temperature
    min: 20
    max: 26
    step: 0.1
    unit_of_measurement: "°C"

  # Normal night cooling start threshold.
  # Recommended default: 23.8
  thz504_cooling_night_start_temp:
    name: THZ504 Cooling Night Start Temperature
    min: 21
    max: 29
    step: 0.1
    unit_of_measurement: "°C"

  # Night stop/comfort target temperature; deliberately higher than day target.
  # Recommended default: 22.8
  thz504_cooling_night_stop_temp:
    name: THZ504 Cooling Night Stop Temperature
    min: 20
    max: 27
    step: 0.1
    unit_of_measurement: "°C"

  # Temperature at which comfort overrides PV/battery optimization.
  # Recommended default: 24.8
  thz504_cooling_comfort_override_temp:
    name: THZ504 Cooling Comfort Override Temperature
    min: 23
    max: 30
    step: 0.1
    unit_of_measurement: "°C"

  # Target sent to the THZ day climate entity.
  # Recommended default: 22.0
  thz504_cooling_day_setpoint:
    name: THZ504 Cooling Day Setpoint
    min: 20
    max: 25
    step: 0.5
    unit_of_measurement: "°C"

  # Target sent to the THZ night climate entity.
  # Recommended default: 22.8
  thz504_cooling_night_setpoint:
    name: THZ504 Cooling Night Setpoint
    min: 20
    max: 26
    step: 0.5
    unit_of_measurement: "°C"

  # Minimum effective PV surplus for day cooling.
  # Recommended default: 700
  thz504_cooling_min_pv_surplus_day:
    name: THZ504 Cooling Minimum PV Surplus Day
    min: 0
    max: 5000
    step: 100
    unit_of_measurement: "W"

  # Minimum grid export considered as usable PV surplus.
  # Recommended default: 500
  thz504_cooling_min_grid_export_day:
    name: THZ504 Cooling Minimum Grid Export Day
    min: 0
    max: 5000
    step: 100
    unit_of_measurement: "W"

  # Maximum tolerated grid import during day cooling.
  # Recommended default: 500
  thz504_cooling_max_grid_import_day:
    name: THZ504 Cooling Maximum Grid Import Day
    min: 0
    max: 3000
    step: 100
    unit_of_measurement: "W"

  # Maximum tolerated grid import during night cooling.
  # Recommended default: 250
  thz504_cooling_max_grid_import_night:
    name: THZ504 Cooling Maximum Grid Import Night
    min: 0
    max: 3000
    step: 100
    unit_of_measurement: "W"

  # Minimum battery SOC for day battery-supported cooling.
  # Recommended default: 45
  thz504_cooling_min_battery_soc_day:
    name: THZ504 Cooling Minimum Battery SOC Day
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"

  # Minimum battery SOC for night cooling.
  # Recommended default: 70
  thz504_cooling_min_battery_soc_night:
    name: THZ504 Cooling Minimum Battery SOC Night
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"

  # Maximum tolerated battery discharge power at night.
  # Recommended default: 1500
  thz504_cooling_max_battery_discharge_night:
    name: THZ504 Cooling Maximum Battery Discharge Night
    min: 0
    max: 5000
    step: 100
    unit_of_measurement: "W"

  # Minimum next-hour PV forecast in Wh for forecast-supported cooling.
  # Recommended default: 800
  thz504_cooling_min_pv_forecast_next_hour_wh:
    name: THZ504 Cooling Minimum PV Forecast Next Hour
    min: 0
    max: 5000
    step: 100
    unit_of_measurement: "Wh"

  # Minimum today PV forecast in Wh for forecast-supported cooling.
  # Recommended default: 12000
  thz504_cooling_min_pv_forecast_today_wh:
    name: THZ504 Cooling Minimum PV Forecast Today
    min: 0
    max: 50000
    step: 500
    unit_of_measurement: "Wh"

  # Forecast temperature threshold for hot-weather cooling pressure.
  # Recommended default: 27.0
  thz504_cooling_weather_hot_temp:
    name: THZ504 Cooling Weather Hot Temperature
    min: 20
    max: 40
    step: 0.5
    unit_of_measurement: "°C"

  # Forecast temperature threshold for very-hot-weather cooling pressure.
  # Recommended default: 30.0
  thz504_cooling_weather_very_hot_temp:
    name: THZ504 Cooling Weather Very Hot Temperature
    min: 22
    max: 42
    step: 0.5
    unit_of_measurement: "°C"

  # Maximum precipitation probability allowed for weather pre-cooling.
  # Recommended default: 60
  thz504_cooling_weather_max_precip_probability:
    name: THZ504 Cooling Weather Maximum Precipitation Probability
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"

  # Temperature offset that lowers the day start threshold during weather pre-cooling.
  # Recommended default: 0.4
  thz504_cooling_weather_precooling_offset:
    name: THZ504 Cooling Weather Precooling Offset
    min: 0
    max: 2
    step: 0.1
    unit_of_measurement: "K"

  # Maximum dewpoint allowed during day cooling.
  # Recommended default: 17.0
  thz504_cooling_max_dewpoint_day:
    name: THZ504 Cooling Maximum Dewpoint Day
    min: 10
    max: 22
    step: 0.1
    unit_of_measurement: "°C"

  # Maximum dewpoint allowed during night cooling.
  # Recommended default: 16.5
  thz504_cooling_max_dewpoint_night:
    name: THZ504 Cooling Maximum Dewpoint Night
    min: 10
    max: 22
    step: 0.1
    unit_of_measurement: "°C"

  # Maximum indoor humidity allowed during day cooling.
  # Recommended default: 65
  thz504_cooling_max_humidity_day:
    name: THZ504 Cooling Maximum Indoor Humidity Day
    min: 45
    max: 80
    step: 1
    unit_of_measurement: "%"

  # Maximum indoor humidity allowed during night cooling.
  # Recommended default: 62
  thz504_cooling_max_humidity_night:
    name: THZ504 Cooling Maximum Indoor Humidity Night
    min: 45
    max: 80
    step: 1
    unit_of_measurement: "%"

  # Required flow-temperature margin above dewpoint when compressor runs.
  # Recommended default: 3.0
  thz504_cooling_dewpoint_safety_margin:
    name: THZ504 Cooling Dewpoint Safety Margin
    min: 2
    max: 6
    step: 0.1
    unit_of_measurement: "K"

  # Daily compressor start limit.
  # Recommended default: 12
  thz504_cooling_max_compressor_starts:
    name: THZ504 Cooling Maximum Compressor Starts Per Day
    min: 2
    max: 30
    step: 1

  # Minimum return-flow minus flow-temperature delta for heat extraction diagnostics.
  # Recommended default: 0.5
  thz504_cooling_min_effective_delta:
    name: THZ504 Cooling Minimum Effective Return Flow Delta
    min: 0
    max: 5
    step: 0.1
    unit_of_measurement: "K"

timer:
  thz504_cooling_min_runtime:
    name: THZ504 Cooling Minimum Runtime
    duration: "01:30:00"

  thz504_cooling_lockout:
    name: THZ504 Cooling Lockout After Stop
    duration: "01:30:00"

template:
  - trigger:
      - platform: time_pattern
        hours: "/1"
      - platform: homeassistant
        event: start
    action:
      - variables:
          weather_entity: "{{ states('input_text.thz504_entity_weather') }}"
      - service: weather.get_forecasts
        target:
          entity_id: "{{ weather_entity }}"
        data:
          type: daily
        response_variable: thz504_weather_response
    sensor:
      - name: "THZ504 Weather Forecast Today Temperature"
        unique_id: thz504_weather_forecast_today_temperature
        unit_of_measurement: "°C"
        state: >
          {% set weather_entity = states('input_text.thz504_entity_weather') %}
          {% set fc = thz504_weather_response.get(weather_entity, {}).get('forecast', []) if thz504_weather_response is defined else [] %}
          {{ fc[0].temperature | float(0) if fc | count > 0 else 0 }}

      - name: "THZ504 Weather Forecast Tomorrow Temperature"
        unique_id: thz504_weather_forecast_tomorrow_temperature
        unit_of_measurement: "°C"
        state: >
          {% set weather_entity = states('input_text.thz504_entity_weather') %}
          {% set fc = thz504_weather_response.get(weather_entity, {}).get('forecast', []) if thz504_weather_response is defined else [] %}
          {{ fc[1].temperature | float(0) if fc | count > 1 else 0 }}

      - name: "THZ504 Weather Forecast Max Temperature Next 3 Days"
        unique_id: thz504_weather_forecast_max_temperature_next_3_days
        unit_of_measurement: "°C"
        state: >
          {% set weather_entity = states('input_text.thz504_entity_weather') %}
          {% set fc = thz504_weather_response.get(weather_entity, {}).get('forecast', []) if thz504_weather_response is defined else [] %}
          {% set ns = namespace(max_temp=0) %}
          {% for day in fc[:3] %}
            {% set temp = day.temperature | float(0) %}
            {% if temp > ns.max_temp %}
              {% set ns.max_temp = temp %}
            {% endif %}
          {% endfor %}
          {{ ns.max_temp | round(1) }}

      - name: "THZ504 Weather Forecast Max Precipitation Probability Next 3 Days"
        unique_id: thz504_weather_forecast_max_precip_probability_next_3_days
        unit_of_measurement: "%"
        state: >
          {% set weather_entity = states('input_text.thz504_entity_weather') %}
          {% set fc = thz504_weather_response.get(weather_entity, {}).get('forecast', []) if thz504_weather_response is defined else [] %}
          {% set ns = namespace(max_prob=0) %}
          {% for day in fc[:3] %}
            {% set prob = day.precipitation_probability | float(0) %}
            {% if prob > ns.max_prob %}
              {% set ns.max_prob = prob %}
            {% endif %}
          {% endfor %}
          {{ ns.max_prob | round(0) }}

      - name: "THZ504 Weather Forecast Today Condition"
        unique_id: thz504_weather_forecast_today_condition
        state: >
          {% set weather_entity = states('input_text.thz504_entity_weather') %}
          {% set fc = thz504_weather_response.get(weather_entity, {}).get('forecast', []) if thz504_weather_response is defined else [] %}
          {{ fc[0].condition if fc | count > 0 and fc[0].condition is defined else 'unknown' }}

      - name: "THZ504 Weather Forecast Tomorrow Condition"
        unique_id: thz504_weather_forecast_tomorrow_condition
        state: >
          {% set weather_entity = states('input_text.thz504_entity_weather') %}
          {% set fc = thz504_weather_response.get(weather_entity, {}).get('forecast', []) if thz504_weather_response is defined else [] %}
          {{ fc[1].condition if fc | count > 1 and fc[1].condition is defined else 'unknown' }}

  - trigger:
      - platform: time_pattern
        minutes: "/1"
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - input_boolean.thz504_cooling_automation_enabled
          - input_boolean.thz504_cooling_allow_night
          - input_boolean.thz504_cooling_pv_preconditioning_enabled
          - input_boolean.thz504_cooling_weather_preconditioning_enabled
          - timer.thz504_cooling_min_runtime
          - timer.thz504_cooling_lockout
    sensor:

      # Robust, dynamically weighted indoor temperature for cooling control.
      # Weekdays:
      #   - Morning / early afternoon: office and guest/second office are weighted higher.
      #   - Afternoon / evening: living room and kitchen are weighted higher.
      #   - Evening / night: bedroom is weighted higher.
      # Weekend:
      #   - Office and guest/second office are weighted with priority 1 all day.
      #   - Living room is weighted with priority 4 from 08:00 to 21:00.
      # Invalid room sensors are ignored together with their weight.
      - name: "Temperatur Haus Kühlung Gewichtung"
        unique_id: temperatur_haus_kuehlung_gewichtung
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >
          {% set hour = now().hour + (now().minute / 60) %}
          {% set weekday = now().weekday() %}
          {% set is_weekend = weekday in [5, 6] %}

          {% set wohnzimmer_entity = 'sensor.eltako_gw1_05_91_dd_e4_temperature' %}
          {% set schlafzimmer_entity = 'sensor.eltako_gw1_05_91_df_e0_temperature' %}
          {% set buero_entity = 'sensor.eltako_gw1_05_96_20_c7_temperature' %}
          {% set kueche_entity = 'sensor.eltako_gw1_05_93_c2_32_temperature' %}
          {% set gast_entity = 'sensor.eltako_gw1_05_96_2a_9f_temperature' %}
          {% set ankleide_entity = 'sensor.eltako_gw1_05_91_dd_cb_temperature' %}

          {% set schlafzimmer = states(schlafzimmer_entity) | float(0) %}

          {% if is_weekend %}
            {# Weekend: office rooms are low priority; living area is primary during the day. #}
            {% set w_wohnzimmer = 4.0 if hour >= 8 and hour < 21 else 3.0 %}
            {% set w_schlafzimmer = 5.0 %}
            {% set w_buero = 1.0 %}
            {% set w_kueche = 1.5 %}
            {% set w_gast = 1.0 %}
            {% set w_ankleide = 0.5 %}
          {% else %}
            {# Weekdays: dynamic occupancy-based weighting. #}
            {% set w_wohnzimmer = 3.0 %}
            {% set w_schlafzimmer = 5.0 %}
            {% set w_buero = 3.0 %}
            {% set w_kueche = 1.5 %}
            {% set w_gast = 3.0 %}
            {% set w_ankleide = 0.5 %}

            {% if hour >= 6 and hour < 14 %}
              {# Morning / early afternoon: home office rooms are more relevant. #}
              {% set w_buero = w_buero + 1.5 %}
              {% set w_gast = w_gast + 1.5 %}
            {% endif %}

            {% if hour >= 14 and hour < 21 %}
              {# Afternoon / evening: living area becomes more relevant. #}
              {% set w_wohnzimmer = w_wohnzimmer + 1.5 %}
              {% set w_kueche = w_kueche + 0.5 %}
            {% endif %}
          {% endif %}

          {% if hour >= 18 or hour < 6 %}
            {# Evening / night: bedroom becomes more relevant. #}
            {% set w_schlafzimmer = w_schlafzimmer + 2.0 %}
          {% endif %}

          {% if hour >= 21 or hour < 6 %}
            {# Night: bedroom is the dominant comfort zone. #}
            {% set w_schlafzimmer = w_schlafzimmer + 2.0 %}
          {% endif %}

          {% if has_value(schlafzimmer_entity) %}
            {# Bedroom comfort protection: increase bedroom priority when it is too warm. #}
            {% if schlafzimmer >= 23.0 %}
              {% set w_schlafzimmer = w_schlafzimmer + 4.0 %}
            {% elif schlafzimmer >= 22.0 %}
              {% set w_schlafzimmer = w_schlafzimmer + 2.0 %}
            {% endif %}
          {% endif %}

          {% set rooms = [
            {'name': 'Wohnzimmer',   'entity': wohnzimmer_entity,   'weight': w_wohnzimmer},
            {'name': 'Schlafzimmer', 'entity': schlafzimmer_entity, 'weight': w_schlafzimmer},
            {'name': 'Buero',        'entity': buero_entity,        'weight': w_buero},
            {'name': 'Kueche',       'entity': kueche_entity,       'weight': w_kueche},
            {'name': 'Gast',         'entity': gast_entity,         'weight': w_gast},
            {'name': 'Ankleide',     'entity': ankleide_entity,     'weight': w_ankleide}
          ] %}

          {% set ns = namespace(weighted_sum=0, weight_sum=0) %}

          {% for room in rooms %}
            {% if has_value(room.entity) %}
              {% set value = states(room.entity) | float %}
              {% set ns.weighted_sum = ns.weighted_sum + (value * room.weight) %}
              {% set ns.weight_sum = ns.weight_sum + room.weight %}
            {% endif %}
          {% endfor %}

          {% if ns.weight_sum > 0 %}
            {{ (ns.weighted_sum / ns.weight_sum) | round(1) }}
          {% else %}
            unavailable
          {% endif %}
        attributes:
          weighting_profile: >
            {% set weekday = now().weekday() %}
            {{ 'weekend' if weekday in [5, 6] else 'weekday' }}
          valid_rooms: >
            {% set rooms = [
              {'name': 'Wohnzimmer',   'entity': 'sensor.eltako_gw1_05_91_dd_e4_temperature'},
              {'name': 'Schlafzimmer', 'entity': 'sensor.eltako_gw1_05_91_df_e0_temperature'},
              {'name': 'Buero',        'entity': 'sensor.eltako_gw1_05_96_20_c7_temperature'},
              {'name': 'Kueche',       'entity': 'sensor.eltako_gw1_05_93_c2_32_temperature'},
              {'name': 'Gast',         'entity': 'sensor.eltako_gw1_05_96_2a_9f_temperature'},
              {'name': 'Ankleide',     'entity': 'sensor.eltako_gw1_05_91_dd_cb_temperature'}
            ] %}
            {% set ns = namespace(names=[]) %}
            {% for room in rooms %}
              {% if has_value(room.entity) %}
                {% set ns.names = ns.names + [room.name] %}
              {% endif %}
            {% endfor %}
            {{ ns.names | join(', ') }}
          current_weights: >
            {% set hour = now().hour + (now().minute / 60) %}
            {% set weekday = now().weekday() %}
            {% set is_weekend = weekday in [5, 6] %}
            {% set schlafzimmer_entity = 'sensor.eltako_gw1_05_91_df_e0_temperature' %}
            {% set schlafzimmer = states(schlafzimmer_entity) | float(0) %}
            {% if is_weekend %}
              {% set w_wohnzimmer = 4.0 if hour >= 8 and hour < 21 else 3.0 %}
              {% set w_schlafzimmer = 5.0 %}
              {% set w_buero = 1.0 %}
              {% set w_kueche = 1.5 %}
              {% set w_gast = 1.0 %}
              {% set w_ankleide = 0.5 %}
            {% else %}
              {% set w_wohnzimmer = 3.0 %}
              {% set w_schlafzimmer = 5.0 %}
              {% set w_buero = 3.0 %}
              {% set w_kueche = 1.5 %}
              {% set w_gast = 3.0 %}
              {% set w_ankleide = 0.5 %}
              {% if hour >= 6 and hour < 14 %}
                {% set w_buero = w_buero + 1.5 %}
                {% set w_gast = w_gast + 1.5 %}
              {% endif %}
              {% if hour >= 14 and hour < 21 %}
                {% set w_wohnzimmer = w_wohnzimmer + 1.5 %}
                {% set w_kueche = w_kueche + 0.5 %}
              {% endif %}
            {% endif %}
            {% if hour >= 18 or hour < 6 %}
              {% set w_schlafzimmer = w_schlafzimmer + 2.0 %}
            {% endif %}
            {% if hour >= 21 or hour < 6 %}
              {% set w_schlafzimmer = w_schlafzimmer + 2.0 %}
            {% endif %}
            {% if has_value(schlafzimmer_entity) %}
              {% if schlafzimmer >= 23.0 %}
                {% set w_schlafzimmer = w_schlafzimmer + 4.0 %}
              {% elif schlafzimmer >= 22.0 %}
                {% set w_schlafzimmer = w_schlafzimmer + 2.0 %}
              {% endif %}
            {% endif %}
            Wohnzimmer={{ w_wohnzimmer }}, Schlafzimmer={{ w_schlafzimmer }}, Buero={{ w_buero }}, Kueche={{ w_kueche }}, Gast={{ w_gast }}, Ankleide={{ w_ankleide }}

      - name: "THZ504 Cooling Net Grid Surplus"
        unique_id: thz504_cooling_net_grid_surplus
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set export_entity = states('input_text.thz504_entity_grid_export') %}
          {% set import_entity = states('input_text.thz504_entity_grid_import') %}
          {% set export = states(export_entity) | float(0) %}
          {% set import = states(import_entity) | float(0) %}
          {{ (export - import) | round(0) }}

      - name: "THZ504 Cooling Effective PV Surplus"
        unique_id: thz504_cooling_effective_pv_surplus
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set pv_surplus_entity = states('input_text.thz504_entity_pv_surplus') %}
          {% set grid_export_entity = states('input_text.thz504_entity_grid_export') %}
          {% set grid_import_entity = states('input_text.thz504_entity_grid_import') %}
          {% set pv_surplus = states(pv_surplus_entity) | float(0) %}
          {% set grid_export = states(grid_export_entity) | float(0) %}
          {% set grid_import = states(grid_import_entity) | float(0) %}
          {{ [pv_surplus, grid_export - grid_import, 0] | max | round(0) }}

      - name: "THZ504 Cooling Return Flow Delta"
        unique_id: thz504_cooling_return_flow_delta
        unit_of_measurement: "K"
        state_class: measurement
        state: >
          {% set flow_entity = states('input_text.thz504_entity_flow_temperature') %}
          {% set return_entity = states('input_text.thz504_entity_return_temperature') %}
          {% set flow = states(flow_entity) | float(0) %}
          {% set ret = states(return_entity) | float(0) %}
          {{ (ret - flow) | round(2) }}

      - name: "THZ504 Cooling Active Setpoint"
        unique_id: thz504_cooling_active_setpoint
        unit_of_measurement: "°C"
        state: >
          {% if is_state('binary_sensor.thz504_cooling_daytime', 'on') %}
            {{ states('input_number.thz504_cooling_day_setpoint') | float(22.0) }}
          {% else %}
            {{ states('input_number.thz504_cooling_night_setpoint') | float(22.8) }}
          {% endif %}

      - name: "THZ504 Cooling Dynamic Start Temperature"
        unique_id: thz504_cooling_dynamic_start_temperature
        unit_of_measurement: "°C"
        state: >
          {% set daytime = is_state('binary_sensor.thz504_cooling_daytime', 'on') %}
          {% set base_start = states('input_number.thz504_cooling_day_start_temp') | float(23.2) if daytime else states('input_number.thz504_cooling_night_start_temp') | float(23.8) %}
          {% set offset = states('input_number.thz504_cooling_weather_precooling_offset') | float(0.4) %}
          {% set weather_pressure = is_state('binary_sensor.thz504_weather_cooling_pressure', 'on') %}
          {% set pv_preconditioning = is_state('input_boolean.thz504_cooling_pv_preconditioning_enabled', 'on') %}
          {% set weather_preconditioning = is_state('input_boolean.thz504_cooling_weather_preconditioning_enabled', 'on') %}
          {% if daytime and pv_preconditioning and weather_preconditioning and weather_pressure %}
            {{ (base_start - offset) | round(1) }}
          {% else %}
            {{ base_start | round(1) }}
          {% endif %}

      - name: "THZ504 Cooling Control Reason"
        unique_id: thz504_cooling_control_reason
        icon: mdi:information-outline
        state: >
          {% set cooling_on = is_state(states('input_text.thz504_entity_cooling_mode_switch'), 'on') %}
          {% set compressor_on = is_state(states('input_text.thz504_entity_compressor'), 'on') %}
          {% if is_state('binary_sensor.thz504_cooling_start_allowed', 'on') %}
            start_allowed
          {% elif cooling_on and is_state('binary_sensor.thz504_cooling_stop_required', 'on') %}
            stop_required
          {% elif cooling_on and is_state('binary_sensor.thz504_cooling_start_conditions_met', 'on') %}
            cooling_active_conditions_met
          {% elif cooling_on %}
            cooling_already_enabled
          {% elif is_state('binary_sensor.thz504_cooling_start_conditions_met', 'on') %}
            start_conditions_met
          {% elif states('sensor.thz504_cooling_start_blocker') not in ['unknown', 'unavailable', 'none', ''] %}
            {{ states('sensor.thz504_cooling_start_blocker') }}
          {% elif is_state('binary_sensor.thz504_cooling_effective_heat_extraction', 'off') and cooling_on and compressor_on %}
            low_cooling_delta
          {% elif is_state('binary_sensor.thz504_weather_cooling_pressure', 'on') %}
            weather_pressure_only_waiting_for_room_or_energy_conditions
          {% else %}
            waiting
          {% endif %}

      - name: "THZ504 Cooling Start Blocker"
        unique_id: thz504_cooling_start_blocker
        icon: mdi:alert-circle-outline
        state: >
          {% set ns = namespace(blockers=[]) %}
          {% set cooling_switch = states('input_text.thz504_entity_cooling_mode_switch') %}
          {% if not is_state('input_boolean.thz504_cooling_automation_enabled', 'on') %}
            {% set ns.blockers = ns.blockers + ['automation_disabled'] %}
          {% endif %}
          {% if not is_state('binary_sensor.thz504_cooling_sensor_data_valid', 'on') %}
            {% set ns.blockers = ns.blockers + ['invalid_sensor_data'] %}
          {% endif %}
          {% if not (
            is_state('binary_sensor.thz504_cooling_demand', 'on')
            or is_state('binary_sensor.thz504_cooling_weather_preconditioning_ready', 'on')
          ) %}
            {% set ns.blockers = ns.blockers + ['no_cooling_demand_or_weather_preconditioning'] %}
          {% endif %}
          {% if not is_state('binary_sensor.thz504_cooling_energy_available', 'on') %}
            {% set ns.blockers = ns.blockers + ['energy_not_available'] %}
          {% endif %}
          {% if not is_state('binary_sensor.thz504_cooling_dew_point_safe', 'on') %}
            {% set ns.blockers = ns.blockers + ['dew_point_not_safe'] %}
          {% endif %}
          {% if not is_state('binary_sensor.thz504_cooling_compressor_starts_safe', 'on') %}
            {% set ns.blockers = ns.blockers + ['compressor_starts_not_safe'] %}
          {% endif %}
          {% if not is_state('binary_sensor.thz504_cooling_time_window_allowed', 'on') %}
            {% set ns.blockers = ns.blockers + ['time_window_not_allowed'] %}
          {% endif %}
          {% if not is_state('timer.thz504_cooling_lockout', 'idle') %}
            {% set ns.blockers = ns.blockers + ['lockout_active'] %}
          {% endif %}
          {% if is_state('binary_sensor.thz504_cooling_start_conditions_met', 'on') and not is_state(cooling_switch, 'off') %}
            {% set ns.blockers = ns.blockers + ['cooling_already_on'] %}
          {% endif %}
          {{ ns.blockers | join(', ') if ns.blockers | count > 0 else 'none' }}

      - name: "THZ504 Cooling Score"
        unique_id: thz504_cooling_score
        unit_of_measurement: "%"
        state_class: measurement
        state: >
          {% set weighted = states(states('input_text.thz504_entity_indoor_temp_weighted')) | float(0) %}
          {% set avg = states(states('input_text.thz504_entity_indoor_temp_average')) | float(0) %}
          {% set outdoor = states(states('input_text.thz504_entity_outdoor_temp')) | float(0) %}
          {% set effective_surplus = states('sensor.thz504_cooling_effective_pv_surplus') | float(0) %}
          {% set soc = states(states('input_text.thz504_entity_battery_soc')) | float(0) %}
          {% set battery_charge = states(states('input_text.thz504_entity_battery_charge')) | float(0) %}
          {% set battery_discharge = states(states('input_text.thz504_entity_battery_discharge')) | float(0) %}
          {% set pv_next_wh = states(states('input_text.thz504_entity_pv_forecast_next_hour')) | float(0) %}
          {% set pv_limit = states(states('input_text.thz504_entity_pv_curtailment')) | float(100) %}
          {% set humidity = states(states('input_text.thz504_entity_indoor_humidity_average')) | float(0) %}
          {% set dewpoint = states(states('input_text.thz504_entity_dewpoint')) | float(99) %}
          {% set forecast_max = states('sensor.thz504_weather_forecast_max_temperature_next_3_days') | float(0) %}
          {% set precip_prob = states('sensor.thz504_weather_forecast_max_precipitation_probability_next_3_days') | float(0) %}
          {% set daytime = is_state('binary_sensor.thz504_cooling_daytime', 'on') %}
          {% set temp_reference = 22.0 if daytime else 22.8 %}
          {% set hot_temp = states('input_number.thz504_cooling_weather_hot_temp') | float(27) %}
          {% set very_hot_temp = states('input_number.thz504_cooling_weather_very_hot_temp') | float(30) %}
          {% set temp_score = ([weighted, avg] | max - temp_reference) * 28 %}
          {% set outdoor_score = (outdoor - 20) * 3 %}
          {% set surplus_score = effective_surplus / 45 %}
          {% set soc_score = (soc - 50) * 0.6 %}
          {% set charge_score = battery_charge / 100 %}
          {% set discharge_penalty = battery_discharge / 120 %}
          {% set forecast_score = pv_next_wh / 80 %}
          {% set weather_score = [forecast_max - hot_temp, 0] | max * 7 %}
          {% set very_hot_bonus = 12 if forecast_max >= very_hot_temp else 0 %}
          {% set rain_penalty = precip_prob / 12 %}
          {% set curtailment_score = 12 if pv_limit < 100 else 0 %}
          {% set humidity_penalty = [humidity - (63 if daytime else 60), 0] | max * 3 %}
          {% set dewpoint_penalty = [dewpoint - (17 if daytime else 16.5), 0] | max * 14 %}
          {% set score = temp_score + outdoor_score + surplus_score + soc_score + charge_score + forecast_score + weather_score + very_hot_bonus + curtailment_score - discharge_penalty - rain_penalty - humidity_penalty - dewpoint_penalty %}
          {{ [[score, 0] | max, 100] | min | round(0) }}

    binary_sensor:
      - name: "THZ504 Cooling Daytime"
        unique_id: thz504_cooling_daytime
        state: >
          {% set start = states('input_datetime.thz504_cooling_day_start_time') %}
          {% set end = states('input_datetime.thz504_cooling_day_end_time') %}
          {% set now_s = now().hour * 3600 + now().minute * 60 + now().second %}
          {% set start_s = (start[0:2] | int(8)) * 3600 + (start[3:5] | int(0)) * 60 + (start[6:8] | int(0)) %}
          {% set end_s = (end[0:2] | int(21)) * 3600 + (end[3:5] | int(0)) * 60 + (end[6:8] | int(0)) %}
          {% if start_s < end_s %}
            {{ now_s >= start_s and now_s < end_s }}
          {% elif start_s > end_s %}
            {{ now_s >= start_s or now_s < end_s }}
          {% else %}
            true
          {% endif %}

      - name: "THZ504 Weather Cooling Pressure"
        unique_id: thz504_weather_cooling_pressure
        state: >
          {% set today = states('sensor.thz504_weather_forecast_today_temperature') | float(0) %}
          {% set tomorrow = states('sensor.thz504_weather_forecast_tomorrow_temperature') | float(0) %}
          {% set max3 = states('sensor.thz504_weather_forecast_max_temperature_next_3_days') | float(0) %}
          {% set precip = states('sensor.thz504_weather_forecast_max_precipitation_probability_next_3_days') | float(0) %}
          {% set hot = states('input_number.thz504_cooling_weather_hot_temp') | float(27) %}
          {% set very_hot = states('input_number.thz504_cooling_weather_very_hot_temp') | float(30) %}
          {% set max_precip = states('input_number.thz504_cooling_weather_max_precip_probability') | float(60) %}
          {{ (today >= hot or tomorrow >= hot or max3 >= very_hot) and precip <= max_precip }}

      - name: "THZ504 Cooling Weather Preconditioning Ready"
        unique_id: thz504_cooling_weather_preconditioning_ready
        state: >
          {% set weighted = states(states('input_text.thz504_entity_indoor_temp_weighted')) | float(0) %}
          {% set daytime = is_state('binary_sensor.thz504_cooling_daytime', 'on') %}
          {% set stop = states('input_number.thz504_cooling_day_stop_temp') | float(22.0) if daytime else states('input_number.thz504_cooling_night_stop_temp') | float(22.8) %}
          {% set min_room_offset = states('input_number.thz504_cooling_weather_precooling_offset') | float(0.4) %}
          {% set weather_pressure = is_state('binary_sensor.thz504_weather_cooling_pressure', 'on') %}
          {% set pv_preconditioning = is_state('input_boolean.thz504_cooling_pv_preconditioning_enabled', 'on') %}
          {% set weather_preconditioning = is_state('input_boolean.thz504_cooling_weather_preconditioning_enabled', 'on') %}
          {{
            daytime
            and pv_preconditioning
            and weather_preconditioning
            and weather_pressure
            and weighted >= (stop + min_room_offset)
          }}

      - name: "THZ504 Cooling Sensor Data Valid"
        unique_id: thz504_cooling_sensor_data_valid
        state: >
          {% set entities = [
            states('input_text.thz504_entity_indoor_temp_average'),
            states('input_text.thz504_entity_indoor_temp_weighted'),
            states('input_text.thz504_entity_indoor_humidity_average'),
            states('input_text.thz504_entity_outdoor_temp'),
            states('input_text.thz504_entity_weather'),
            states('input_text.thz504_entity_pv_generation'),
            states('input_text.thz504_entity_pv_direct_consumption'),
            states('input_text.thz504_entity_pv_curtailment'),
            states('input_text.thz504_entity_pv_surplus'),
            states('input_text.thz504_entity_grid_import'),
            states('input_text.thz504_entity_grid_export'),
            states('input_text.thz504_entity_battery_soc'),
            states('input_text.thz504_entity_battery_charge'),
            states('input_text.thz504_entity_battery_discharge'),
            states('input_text.thz504_entity_pv_forecast_next_hour'),
            states('input_text.thz504_entity_pv_forecast_today'),
            states('input_text.thz504_entity_dewpoint'),
            states('input_text.thz504_entity_flow_temperature'),
            states('input_text.thz504_entity_return_temperature'),
            states('input_text.thz504_entity_compressor'),
            states('input_text.thz504_entity_compressor_starts_today'),
            states('input_text.thz504_entity_cooling_mode_switch'),
            states('input_text.thz504_entity_climate_day'),
            states('input_text.thz504_entity_climate_night')
          ] %}
          {% set ns = namespace(valid=true) %}
          {% for e in entities %}
            {% if e in ['', 'unknown', 'unavailable', 'none', 'None'] or not has_value(e) %}
              {% set ns.valid = false %}
            {% endif %}
          {% endfor %}
          {{ ns.valid }}

      - name: "THZ504 Cooling Demand"
        unique_id: thz504_cooling_demand
        state: >
          {% set weighted = states(states('input_text.thz504_entity_indoor_temp_weighted')) | float(0) %}
          {% set avg = states(states('input_text.thz504_entity_indoor_temp_average')) | float(0) %}
          {% set active = is_state(states('input_text.thz504_entity_cooling_mode_switch'), 'on') %}
          {% set start = states('sensor.thz504_cooling_dynamic_start_temperature') | float(23.2) %}
          {% set daytime = is_state('binary_sensor.thz504_cooling_daytime', 'on') %}
          {% set stop = states('input_number.thz504_cooling_day_stop_temp') | float(22.0) if daytime else states('input_number.thz504_cooling_night_stop_temp') | float(22.8) %}
          {{ weighted >= start or avg >= (start + 0.3) or (active and weighted > stop) }}

      - name: "THZ504 Cooling Comfort Override"
        unique_id: thz504_cooling_comfort_override
        state: >
          {% set weighted = states(states('input_text.thz504_entity_indoor_temp_weighted')) | float(0) %}
          {% set avg = states(states('input_text.thz504_entity_indoor_temp_average')) | float(0) %}
          {% set override = states('input_number.thz504_cooling_comfort_override_temp') | float(24.8) %}
          {{ weighted >= override or avg >= (override + 0.2) }}

      - name: "THZ504 Cooling Energy Available"
        unique_id: thz504_cooling_energy_available
        state: >
          {% set effective_surplus = states('sensor.thz504_cooling_effective_pv_surplus') | float(0) %}
          {% set grid_export = states(states('input_text.thz504_entity_grid_export')) | float(0) %}
          {% set grid_import = states(states('input_text.thz504_entity_grid_import')) | float(0) %}
          {% set pv = states(states('input_text.thz504_entity_pv_generation')) | float(0) %}
          {% set pv_limit = states(states('input_text.thz504_entity_pv_curtailment')) | float(100) %}
          {% set soc = states(states('input_text.thz504_entity_battery_soc')) | float(0) %}
          {% set battery_charge = states(states('input_text.thz504_entity_battery_charge')) | float(0) %}
          {% set battery_discharge = states(states('input_text.thz504_entity_battery_discharge')) | float(0) %}
          {% set pv_next_wh = states(states('input_text.thz504_entity_pv_forecast_next_hour')) | float(0) %}
          {% set pv_today_wh = states(states('input_text.thz504_entity_pv_forecast_today')) | float(0) %}
          {% set daytime = is_state('binary_sensor.thz504_cooling_daytime', 'on') %}
          {% set comfort_override = is_state('binary_sensor.thz504_cooling_comfort_override', 'on') %}
          {% set pv_preconditioning = is_state('input_boolean.thz504_cooling_pv_preconditioning_enabled', 'on') %}
          {% set weather_pressure = is_state('binary_sensor.thz504_weather_cooling_pressure', 'on') %}
          {% set weather_preconditioning = is_state('input_boolean.thz504_cooling_weather_preconditioning_enabled', 'on') %}
          {% set min_surplus_day = states('input_number.thz504_cooling_min_pv_surplus_day') | float(700) %}
          {% set min_export_day = states('input_number.thz504_cooling_min_grid_export_day') | float(500) %}
          {% set max_import_day = states('input_number.thz504_cooling_max_grid_import_day') | float(500) %}
          {% set max_import_night = states('input_number.thz504_cooling_max_grid_import_night') | float(250) %}
          {% set min_soc_day = states('input_number.thz504_cooling_min_battery_soc_day') | float(45) %}
          {% set min_soc_night = states('input_number.thz504_cooling_min_battery_soc_night') | float(70) %}
          {% set max_discharge_night = states('input_number.thz504_cooling_max_battery_discharge_night') | float(1500) %}
          {% set min_next_wh = states('input_number.thz504_cooling_min_pv_forecast_next_hour_wh') | float(800) %}
          {% set min_today_wh = states('input_number.thz504_cooling_min_pv_forecast_today_wh') | float(12000) %}
          {% set day_direct_surplus = daytime and effective_surplus >= min_surplus_day and grid_import <= max_import_day %}
          {% set day_grid_export = daytime and grid_export >= min_export_day and grid_import <= max_import_day %}
          {% set day_forecast_supported = daytime and pv_preconditioning and pv >= 1200 and pv_next_wh >= min_next_wh and pv_today_wh >= min_today_wh and grid_import <= max_import_day %}
          {% set day_weather_supported = daytime and weather_preconditioning and weather_pressure and pv_preconditioning and pv_next_wh >= (min_next_wh * 0.7) and grid_import <= max_import_day %}
          {% set day_battery_supported = daytime and soc >= min_soc_day and battery_discharge <= 1500 and grid_import <= max_import_day %}
          {% set curtailment_supported = daytime and pv_limit < 100 and pv >= 1200 %}
          {% set battery_charging_supported = daytime and battery_charge >= 500 and grid_import <= max_import_day %}
          {% set night_battery_supported = not daytime and soc >= min_soc_night and battery_discharge <= max_discharge_night and grid_import <= max_import_night %}
          {{ day_direct_surplus or day_grid_export or day_forecast_supported or day_weather_supported or day_battery_supported or curtailment_supported or battery_charging_supported or night_battery_supported or comfort_override }}

      - name: "THZ504 Cooling Dew Point Safe"
        unique_id: thz504_cooling_dewpoint_safe
        state: >
          {% set humidity = states(states('input_text.thz504_entity_indoor_humidity_average')) | float(99) %}
          {% set dewpoint = states(states('input_text.thz504_entity_dewpoint')) | float(99) %}
          {% set flow = states(states('input_text.thz504_entity_flow_temperature')) | float(99) %}
          {% set compressor_on = is_state(states('input_text.thz504_entity_compressor'), 'on') %}
          {% set daytime = is_state('binary_sensor.thz504_cooling_daytime', 'on') %}
          {% set max_humidity = states('input_number.thz504_cooling_max_humidity_day') | float(65) if daytime else states('input_number.thz504_cooling_max_humidity_night') | float(62) %}
          {% set max_dewpoint = states('input_number.thz504_cooling_max_dewpoint_day') | float(17.0) if daytime else states('input_number.thz504_cooling_max_dewpoint_night') | float(16.5) %}
          {% set margin = states('input_number.thz504_cooling_dewpoint_safety_margin') | float(3.0) %}
          {% set general_safe = humidity <= max_humidity and dewpoint <= max_dewpoint %}
          {% set flow_safe = flow >= (dewpoint + margin) %}
          {{ general_safe and (not compressor_on or flow_safe) }}

      - name: "THZ504 Cooling Compressor Starts Safe"
        unique_id: thz504_cooling_compressor_starts_safe
        state: >
          {% set starts = states(states('input_text.thz504_entity_compressor_starts_today')) | int(0) %}
          {% set max_starts = states('input_number.thz504_cooling_max_compressor_starts') | int(12) %}
          {{ starts < max_starts }}

      - name: "THZ504 Cooling Time Window Allowed"
        unique_id: thz504_cooling_time_window_allowed
        state: >
          {{ is_state('binary_sensor.thz504_cooling_daytime', 'on') or is_state('input_boolean.thz504_cooling_allow_night', 'on') }}

      - name: "THZ504 Cooling Effective Heat Extraction"
        unique_id: thz504_cooling_effective_heat_extraction
        state: >
          {% set delta = states('sensor.thz504_cooling_return_flow_delta') | float(0) %}
          {% set min_delta = states('input_number.thz504_cooling_min_effective_delta') | float(0.5) %}
          {% set compressor_on = is_state(states('input_text.thz504_entity_compressor'), 'on') %}
          {% set cooling_on = is_state(states('input_text.thz504_entity_cooling_mode_switch'), 'on') %}
          {{ cooling_on and compressor_on and delta >= min_delta }}

      - name: "THZ504 Cooling Start Conditions Met"
        unique_id: thz504_cooling_start_conditions_met
        state: >
          {{
            is_state('input_boolean.thz504_cooling_automation_enabled', 'on')
            and is_state('binary_sensor.thz504_cooling_sensor_data_valid', 'on')
            and (
              is_state('binary_sensor.thz504_cooling_demand', 'on')
              or is_state('binary_sensor.thz504_cooling_weather_preconditioning_ready', 'on')
            )
            and is_state('binary_sensor.thz504_cooling_energy_available', 'on')
            and is_state('binary_sensor.thz504_cooling_dew_point_safe', 'on')
            and is_state('binary_sensor.thz504_cooling_compressor_starts_safe', 'on')
            and is_state('binary_sensor.thz504_cooling_time_window_allowed', 'on')
            and is_state('timer.thz504_cooling_lockout', 'idle')
          }}

      - name: "THZ504 Cooling Start Allowed"
        unique_id: thz504_cooling_start_allowed
        state: >
          {{
            is_state('binary_sensor.thz504_cooling_start_conditions_met', 'on')
            and is_state(states('input_text.thz504_entity_cooling_mode_switch'), 'off')
          }}

      - name: "THZ504 Cooling Stop Required"
        unique_id: thz504_cooling_stop_required
        state: >
          {% set weighted = states(states('input_text.thz504_entity_indoor_temp_weighted')) | float(99) %}
          {% set daytime = is_state('binary_sensor.thz504_cooling_daytime', 'on') %}
          {% set stop = states('input_number.thz504_cooling_day_stop_temp') | float(22.0) if daytime else states('input_number.thz504_cooling_night_stop_temp') | float(22.8) %}
          {% set comfort_override = is_state('binary_sensor.thz504_cooling_comfort_override', 'on') %}
          {% set no_demand = weighted <= stop %}
          {% set dewpoint_risk = is_state('binary_sensor.thz504_cooling_dew_point_safe', 'off') %}
          {% set no_energy = is_state('binary_sensor.thz504_cooling_energy_available', 'off') and not comfort_override %}
          {% set starts_limit = is_state('binary_sensor.thz504_cooling_compressor_starts_safe', 'off') %}
          {% set time_blocked = is_state('binary_sensor.thz504_cooling_time_window_allowed', 'off') and not comfort_override %}
          {% set invalid_data = is_state('binary_sensor.thz504_cooling_sensor_data_valid', 'off') %}
          {{ no_demand or dewpoint_risk or no_energy or starts_limit or time_blocked or invalid_data }}

automation:
  - id: thz504_dynamic_floor_cooling_start
    alias: "THZ504 - Dynamic Floor Cooling Start"
    description: "Starts THZ504 floor cooling when comfort, PV/battery/grid, weather and dewpoint safety allow it."
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.thz504_cooling_start_allowed
        to: "on"
        for: "00:15:00"
      - platform: time_pattern
        minutes: "/10"
    condition:
      - condition: state
        entity_id: binary_sensor.thz504_cooling_start_allowed
        state: "on"
    action:
      - variables:
          climate_day_entity: "{{ states('input_text.thz504_entity_climate_day') }}"
          climate_night_entity: "{{ states('input_text.thz504_entity_climate_night') }}"
          cooling_switch_entity: "{{ states('input_text.thz504_entity_cooling_mode_switch') }}"
          notify_service: "{{ states('input_text.thz504_entity_notify_service') }}"
          weighted_entity: "{{ states('input_text.thz504_entity_indoor_temp_weighted') }}"
          average_entity: "{{ states('input_text.thz504_entity_indoor_temp_average') }}"
          humidity_entity: "{{ states('input_text.thz504_entity_indoor_humidity_average') }}"
          dewpoint_entity: "{{ states('input_text.thz504_entity_dewpoint') }}"
          flow_entity: "{{ states('input_text.thz504_entity_flow_temperature') }}"
          return_entity: "{{ states('input_text.thz504_entity_return_temperature') }}"
          grid_import_entity: "{{ states('input_text.thz504_entity_grid_import') }}"
          grid_export_entity: "{{ states('input_text.thz504_entity_grid_export') }}"
          battery_soc_entity: "{{ states('input_text.thz504_entity_battery_soc') }}"
          pv_forecast_next_hour_entity: "{{ states('input_text.thz504_entity_pv_forecast_next_hour') }}"
          compressor_starts_entity: "{{ states('input_text.thz504_entity_compressor_starts_today') }}"
      - service: climate.set_temperature
        target:
          entity_id: "{{ climate_day_entity }}"
        data:
          temperature: "{{ states('input_number.thz504_cooling_day_setpoint') | float(22.0) }}"
      - service: climate.set_temperature
        target:
          entity_id: "{{ climate_night_entity }}"
        data:
          temperature: "{{ states('input_number.thz504_cooling_night_setpoint') | float(22.8) }}"
      - service: switch.turn_on
        target:
          entity_id: "{{ cooling_switch_entity }}"
      - service: timer.start
        target:
          entity_id: timer.thz504_cooling_min_runtime
      - service: logbook.log
        data:
          name: "THZ504 Cooling"
          message: >
            Cooling started. Reason={{ states('sensor.thz504_cooling_control_reason') }},
            weighted_temperature={{ states(weighted_entity) }} °C,
            average_temperature={{ states(average_entity) }} °C,
            target={{ states('sensor.thz504_cooling_active_setpoint') }} °C,
            pv_surplus={{ states('sensor.thz504_cooling_effective_pv_surplus') }} W,
            weather_max_3d={{ states('sensor.thz504_weather_forecast_max_temperature_next_3_days') }} °C,
            score={{ states('sensor.thz504_cooling_score') }} %.
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.thz504_cooling_notification_mode
                state: "info"
            sequence:
              - service: "{{ notify_service }}"
                data:
                  title: "THZ504 Cooling switched on"
                  message: >
                    Cooling was switched on by automation.
                    Reason={{ states('sensor.thz504_cooling_control_reason') }}.
                    Start blocker={{ states('sensor.thz504_cooling_start_blocker') }}.
                    Weighted temperature={{ states(weighted_entity) }} °C.
                    Target={{ states('sensor.thz504_cooling_active_setpoint') }} °C.

  - id: thz504_dynamic_floor_cooling_stop
    alias: "THZ504 - Dynamic Floor Cooling Stop"
    description: "Stops THZ504 floor cooling after minimum runtime when demand, energy or safety conditions no longer allow operation."
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.thz504_cooling_stop_required
        to: "on"
        for: "00:20:00"
      - platform: time_pattern
        minutes: "/10"
    condition:
      - condition: template
        value_template: "{{ is_state(states('input_text.thz504_entity_cooling_mode_switch'), 'on') }}"
      - condition: state
        entity_id: timer.thz504_cooling_min_runtime
        state: "idle"
      - condition: state
        entity_id: binary_sensor.thz504_cooling_stop_required
        state: "on"
    action:
      - variables:
          cooling_switch_entity: "{{ states('input_text.thz504_entity_cooling_mode_switch') }}"
          notify_service: "{{ states('input_text.thz504_entity_notify_service') }}"
          weighted_entity: "{{ states('input_text.thz504_entity_indoor_temp_weighted') }}"
          average_entity: "{{ states('input_text.thz504_entity_indoor_temp_average') }}"
          humidity_entity: "{{ states('input_text.thz504_entity_indoor_humidity_average') }}"
          dewpoint_entity: "{{ states('input_text.thz504_entity_dewpoint') }}"
          flow_entity: "{{ states('input_text.thz504_entity_flow_temperature') }}"
          return_entity: "{{ states('input_text.thz504_entity_return_temperature') }}"
          grid_import_entity: "{{ states('input_text.thz504_entity_grid_import') }}"
          grid_export_entity: "{{ states('input_text.thz504_entity_grid_export') }}"
          battery_soc_entity: "{{ states('input_text.thz504_entity_battery_soc') }}"
      - service: switch.turn_off
        target:
          entity_id: "{{ cooling_switch_entity }}"
      - service: timer.start
        target:
          entity_id: timer.thz504_cooling_lockout
      - service: logbook.log
        data:
          name: "THZ504 Cooling"
          message: >
            Cooling stopped. Reason={{ states('sensor.thz504_cooling_control_reason') }},
            weighted_temperature={{ states(weighted_entity) }} °C,
            pv_surplus={{ states('sensor.thz504_cooling_effective_pv_surplus') }} W,
            delta={{ states('sensor.thz504_cooling_return_flow_delta') }} K.
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.thz504_cooling_notification_mode
                state: "info"
            sequence:
              - service: "{{ notify_service }}"
                data:
                  title: "THZ504 Cooling switched off"
                  message: >
                    Cooling was switched off by automation.
                    Reason={{ states('sensor.thz504_cooling_control_reason') }}.
                    Stop required={{ states('binary_sensor.thz504_cooling_stop_required') }}.
                    Weighted temperature={{ states(weighted_entity) }} °C.
                    Delta={{ states('sensor.thz504_cooling_return_flow_delta') }} K.

  - id: thz504_dynamic_floor_cooling_safety_stop
    alias: "THZ504 - Dynamic Floor Cooling Safety Stop"
    description: "Immediately stops cooling on invalid sensor data or condensation risk."
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.thz504_cooling_sensor_data_valid
        to: "off"
        for: "00:10:00"
      - platform: state
        entity_id: binary_sensor.thz504_cooling_dew_point_safe
        to: "off"
        for: "00:05:00"
      - platform: template
        value_template: >
          {% set dewpoint = states(states('input_text.thz504_entity_dewpoint')) | float(99) %}
          {% set flow = states(states('input_text.thz504_entity_flow_temperature')) | float(99) %}
          {% set margin = states('input_number.thz504_cooling_dewpoint_safety_margin') | float(3.0) %}
          {{ is_state(states('input_text.thz504_entity_cooling_mode_switch'), 'on') and flow < (dewpoint + margin) }}
        for: "00:03:00"
    condition:
      - condition: template
        value_template: "{{ is_state(states('input_text.thz504_entity_cooling_mode_switch'), 'on') }}"
    action:
      - variables:
          cooling_switch_entity: "{{ states('input_text.thz504_entity_cooling_mode_switch') }}"
          notify_service: "{{ states('input_text.thz504_entity_notify_service') }}"
          humidity_entity: "{{ states('input_text.thz504_entity_indoor_humidity_average') }}"
          dewpoint_entity: "{{ states('input_text.thz504_entity_dewpoint') }}"
          flow_entity: "{{ states('input_text.thz504_entity_flow_temperature') }}"
          return_entity: "{{ states('input_text.thz504_entity_return_temperature') }}"
      - service: switch.turn_off
        target:
          entity_id: "{{ cooling_switch_entity }}"
      - service: timer.start
        target:
          entity_id: timer.thz504_cooling_lockout
      - service: logbook.log
        data:
          name: "THZ504 Cooling"
          message: >
            Cooling safety stop triggered. Reason={{ states('sensor.thz504_cooling_control_reason') }},
            humidity={{ states(humidity_entity) }} %, dewpoint={{ states(dewpoint_entity) }} °C,
            flow={{ states(flow_entity) }} °C.
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.thz504_cooling_notification_mode
                state: "info"
            sequence:
              - service: "{{ notify_service }}"
                data:
                  title: "THZ504 Cooling safety stop"
                  message: >
                    Cooling was switched off by safety automation.
                    Reason={{ states('sensor.thz504_cooling_control_reason') }}.
                    Dew point safe={{ states('binary_sensor.thz504_cooling_dew_point_safe') }}.
                    Sensor data valid={{ states('binary_sensor.thz504_cooling_sensor_data_valid') }}.
                    Flow={{ states(flow_entity) }} °C.

  - id: thz504_dynamic_floor_cooling_setpoint_sync
    alias: "THZ504 - Dynamic Floor Cooling Setpoint Sync"
    description: "Synchronizes UI-controlled cooling setpoint helpers to the mapped THZ climate entities."
    mode: restart
    trigger:
      - platform: state
        entity_id:
          - input_number.thz504_cooling_day_setpoint
          - input_number.thz504_cooling_night_setpoint
      - platform: homeassistant
        event: start
    condition:
      - condition: state
        entity_id: input_boolean.thz504_cooling_automation_enabled
        state: "on"
    action:
      - delay: "00:00:10"
      - variables:
          climate_day_entity: "{{ states('input_text.thz504_entity_climate_day') }}"
          climate_night_entity: "{{ states('input_text.thz504_entity_climate_night') }}"
          notify_service: "{{ states('input_text.thz504_entity_notify_service') }}"
      - service: climate.set_temperature
        target:
          entity_id: "{{ climate_day_entity }}"
        data:
          temperature: "{{ states('input_number.thz504_cooling_day_setpoint') | float(22.0) }}"
      - service: climate.set_temperature
        target:
          entity_id: "{{ climate_night_entity }}"
        data:
          temperature: "{{ states('input_number.thz504_cooling_night_setpoint') | float(22.8) }}"
      - service: logbook.log
        data:
          name: "THZ504 Cooling"
          message: >
            Cooling setpoints synchronized to THZ. Day={{ states('input_number.thz504_cooling_day_setpoint') }} °C,
            night={{ states('input_number.thz504_cooling_night_setpoint') }} °C.

  - id: thz504_dynamic_floor_cooling_precooling_dependency
    alias: "THZ504 - Dynamic Floor Cooling Precooling Dependency"
    description: "Keeps weather preconditioning dependent on PV preconditioning without sending mobile push notifications."
    mode: restart
    trigger:
      - platform: state
        entity_id:
          - input_boolean.thz504_cooling_pv_preconditioning_enabled
          - input_boolean.thz504_cooling_weather_preconditioning_enabled
    action:
      - choose:
          # If PV preconditioning is disabled, weather preconditioning is disabled as well.
          - conditions:
              - condition: template
                value_template: >
                  {{
                    trigger.entity_id == 'input_boolean.thz504_cooling_pv_preconditioning_enabled'
                    and trigger.to_state.state == 'off'
                    and is_state('input_boolean.thz504_cooling_weather_preconditioning_enabled', 'on')
                  }}
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.thz504_cooling_weather_preconditioning_enabled

              - service: logbook.log
                data:
                  name: "THZ504 Cooling"
                  message: "Weather preconditioning disabled because PV preconditioning was disabled."

              - service: persistent_notification.create
                data:
                  title: "THZ504 Cooling"
                  message: "Weather preconditioning was disabled because PV preconditioning was disabled."
                  notification_id: thz504_cooling_precooling_dependency

          # If weather preconditioning is enabled while PV preconditioning is disabled, revert it.
          - conditions:
              - condition: template
                value_template: >
                  {{
                    trigger.entity_id == 'input_boolean.thz504_cooling_weather_preconditioning_enabled'
                    and trigger.to_state.state == 'on'
                    and is_state('input_boolean.thz504_cooling_pv_preconditioning_enabled', 'off')
                  }}
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.thz504_cooling_weather_preconditioning_enabled

              - service: logbook.log
                data:
                  name: "THZ504 Cooling"
                  message: "Weather preconditioning cannot be enabled while PV preconditioning is disabled."

              - service: persistent_notification.create
                data:
                  title: "THZ504 Cooling"
                  message: "Weather preconditioning cannot be enabled while PV preconditioning is disabled. It was turned off again."
                  notification_id: thz504_cooling_precooling_dependency

  - id: thz504_dynamic_floor_cooling_status_notification
    alias: "THZ504 - Dynamic Floor Cooling Status Notification"
    description: "Sends one debounced push notification after selected high-level cooling control states have stabilized. Cooling Score is not pushed."
    mode: restart
    trigger:
      - platform: state
        entity_id:
          # Cooling allowed: true only when start conditions are met and cooling is currently off.
          - binary_sensor.thz504_cooling_start_allowed
          # Conditions met: true when all technical start conditions are met, independent of current cooling state.
          - binary_sensor.thz504_cooling_start_conditions_met
          # Start blocker: textual reason why start is currently blocked.
          - sensor.thz504_cooling_start_blocker
          # Stop required: true when cooling should stop after normal stop delay/minimum runtime logic.
          - binary_sensor.thz504_cooling_stop_required
          # Control reason: main high-level cooling state/reason.
          - sensor.thz504_cooling_control_reason
    condition:
      - condition: state
        entity_id: input_select.thz504_cooling_notification_mode
        state: "debug"
      - condition: template
        value_template: >
          {{
            trigger.from_state is not none
            and trigger.to_state is not none
            and trigger.from_state.state not in ['unknown', 'unavailable']
            and trigger.to_state.state not in ['unknown', 'unavailable']
            and trigger.from_state.state != trigger.to_state.state
          }}
    action:
      # Debounce window:
      # Related template sensor changes are collapsed into one push notification.
      - delay: "00:00:30"

      - variables:
          notify_service: "{{ states('input_text.thz504_entity_notify_service') }}"
          control_reason: "{{ states('sensor.thz504_cooling_control_reason') }}"
          start_blocker: "{{ states('sensor.thz504_cooling_start_blocker') }}"
          start_conditions_met: "{{ states('binary_sensor.thz504_cooling_start_conditions_met') }}"
          start_allowed: "{{ states('binary_sensor.thz504_cooling_start_allowed') }}"
          stop_required: "{{ states('binary_sensor.thz504_cooling_stop_required') }}"
          cooling_switch_entity: "{{ states('input_text.thz504_entity_cooling_mode_switch') }}"
          cooling_switch_state: "{{ states(states('input_text.thz504_entity_cooling_mode_switch')) }}"
      - service: "{{ notify_service }}"
        data:
          title: "THZ504 Cooling state changed"
          message: >
            Cooling state stabilized after recent changes.
            Current Control Reason={{ control_reason }}.
            Current Start blocker={{ start_blocker }}.
            Conditions met={{ start_conditions_met }}.
            Start allowed={{ start_allowed }}.
            Stop required={{ stop_required }}.
            Cooling={{ cooling_switch_state }}.
